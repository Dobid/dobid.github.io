  sections:
    Education:
      - institution: Paris-Saclay University — ONERA — Akkodis Research
        area: Learning-Based Control of a Fixed-Wing UAV (FW-UAV) Under Wind Disturbances
        studyType: PhD in Robotics
        start_date: 2022
        end_date: 2025
        highlights:
          - Investigation of reinforcement learning based techniques for developing autopilot systems.
          - Results on model-free RL (PPO/SAC) versus model-based RL (TDMPC2) algorithms for attitude control of a fixed-wing UAV under wind disturbances.
          - Extended this work to waypoint tracking, showing TDMPC2's potential for hard waypoint tracking with complex acrobatic maneuvers and robustness to wind gusts.

      - institution: ECE Paris
        area: Computer Science
        studyType: Master of Science, Embedded Systems Major
        start_date: 2016
        end_date: 2021
        highlights:
          - "Relevant courses: Robotics, Reinforcement Learning, Linux Kernel Programming, Data Structures and Algorithms."

      - institution: Ajou University
        location: South Korea
        area: Software Engineering
        studyType: Abroad Semester
        start_date: 2018-09
        end_date: 2018-12
        highlights:
          - "Relevant courses: System Programming (GNU/Linux Ubuntu and Raspberry Pi), Data Structures, Operating Systems, Korean."

    Experience:
      - company: Akkodis Research
        position: Research Engineer
        location: Paris Area
        start_date: 2025-01
        end_date: present
        highlights:
          - Worked on autonomous driving systems, contributing to the navigation stack of an autonomous car (Kia Niro).
          - Developed control algorithms and tested them on a simulated digital twin in the CARLA simulator.
          - "Tools: ROS2, CARLA, C++."

      - company: Akkodis Research
        position: Robotics Engineer
        location: Toulouse
        start_date: 2021-09
        end_date: 2022-09
        highlights:
          - Contributed to the Gearbodies European Project involving a holonomic wheeled robot for non-destructive inspection of composite train carbodies.
          - Developed a navigation stack enabling the robot to autonomously complete its inspection mission.
          - "Tools: ROS2, Gazebo, C++, Python, and sensor fusion for localization and mapping using time-of-flight, ultrasound, and 2D/3D LiDARs."

      - company: Capgemini Engineering
        position: R&D Artificial Intelligence & Robotics Engineer Intern
        location: Blagnac
        start_date: 2021-03
        end_date: 2021-08
        highlights:
          - Designed and implemented deep reinforcement learning models for quadrupedal locomotion of a wheeled/legged robot.
          - "Tools: OpenAI Gym, Stable Baselines, TensorFlow, PyBullet, Robotics."

      - company: Safran Electronics & Defense (Safran Data Systems)
        position: Integration Validation Verification Engineer Intern
        location: Les Ulis
        start_date: 2020-05
        end_date: 2020-08
        highlights:
          - Improved an automatic benchmark for testing and validating airborne embedded equipment (mission recorder).
          - Tested embedded software including commands, encryption, self-diagnosis, and video signals.
          - "Tools: Ruby, military standards, video formats, and communications."

